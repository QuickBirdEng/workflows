name: Deploy Superset

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      values-file:
        required: false
        type: string
        default: ""
      ingress-host:
        required: false
        type: string
        default: ""
      allowed-ips:
        required: false
        type: string
        default: ""
        description: "Comma-separated list of CIDRs to whitelist (e.g. '1.2.3.4/32,5.6.7.8/24'). Leave empty to allow all."
      one_pw_secrets_note_item:
        required: true
        type: string
      one_pw_vault:
        required: true
        type: string
      one_pw_k8s_deploy_credentials:
        required: true
        type: string
      op_service_account_token:
        required: true
        type: string

jobs:
  setup-k8s-secrets:
    runs-on: [self-hosted, docker]
    if: contains('["acpoppe","KlausNie","nasirky"]', github.triggering_actor)
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Load secret
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets[inputs.op_service_account_token] }}
          K8S_API_URL: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_k8s_deploy_credentials }}/K8s Credentials/kube-api-url
          K8S_SERVICE_ACCOUNT_TOKEN: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_k8s_deploy_credentials }}/K8s Credentials/kube-service-account-secret
          SUPERSET_SECRET_KEY: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SUPERSET_SECRET_KEY
          DB_HOST: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/DB_HOST
          DB_PORT: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/DB_PORT
          DB_USER: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/DB_USER
          DB_PASS: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/DB_PASS
          DB_NAME: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/DB_NAME
          SMTP_HOST: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SMTP_HOST
          SMTP_PORT: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SMTP_PORT
          SMTP_USER: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SMTP_USER
          SMTP_PASSWORD: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SMTP_PASSWORD
          SMTP_MAIL_FROM: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SMTP_MAIL_FROM
          SMTP_SSL: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SMTP_SSL
          SMTP_STARTTLS: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/SMTP_STARTTLS

      - uses: azure/setup-kubectl@v4
      - uses: azure/k8s-set-context@v4
        with:
          method: service-account
          k8s-url: ${{ env.K8S_API_URL }}
          k8s-secret: ${{ env.K8S_SERVICE_ACCOUNT_TOKEN }}

      - name: Delete Superset Secrets
        continue-on-error: true
        run: kubectl delete secret superset-env --namespace=${{ inputs.namespace }}
      - name: Apply Superset Secrets
        run: |
          kubectl create secret generic superset-env \
            --from-literal=SUPERSET_SECRET_KEY="${{ env.SUPERSET_SECRET_KEY }}" \
            --from-literal=DB_HOST="${{ env.DB_HOST }}" \
            --from-literal=DB_PORT="${{ env.DB_PORT }}" \
            --from-literal=DB_USER="${{ env.DB_USER }}" \
            --from-literal=DB_PASSWORD="${{ env.DB_PASS }}" \
            --from-literal=DB_NAME="${{ env.DB_NAME }}" \
            --from-literal=SMTP_HOST="${{ env.SMTP_HOST }}" \
            --from-literal=SMTP_PORT="${{ env.SMTP_PORT }}" \
            --from-literal=SMTP_USER="${{ env.SMTP_USER }}" \
            --from-literal=SMTP_PASSWORD="${{ env.SMTP_PASSWORD }}" \
            --from-literal=SMTP_MAIL_FROM="${{ env.SMTP_MAIL_FROM }}" \
            --from-literal=SMTP_SSL="${{ env.SMTP_SSL }}" \
            --from-literal=SMTP_STARTTLS="${{ env.SMTP_STARTTLS }}" \
            --namespace=${{ inputs.namespace }}
          kubectl label secret superset-env \
            app.kubernetes.io/managed-by=Helm \
            --namespace=${{ inputs.namespace }}
          kubectl annotate secret superset-env \
            meta.helm.sh/release-name=superset \
            meta.helm.sh/release-namespace=${{ inputs.namespace }} \
            --namespace=${{ inputs.namespace }}

  deploy-superset:
    runs-on: [self-hosted, docker]
    if: contains('["acpoppe","KlausNie","nasirky"]', github.triggering_actor)
    needs: setup-k8s-secrets
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v3
        with:
          version: "3.13.3"

      - name: Load secret
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets[inputs.op_service_account_token] }}
          K8S_API_URL: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_k8s_deploy_credentials }}/K8s Credentials/kube-api-url
          K8S_SERVICE_ACCOUNT_TOKEN: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_k8s_deploy_credentials }}/K8s Credentials/kube-service-account-secret
          DB_HOST: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/DB_HOST
          DB_PORT: op://${{ inputs.one_pw_vault }}/${{ inputs.one_pw_secrets_note_item }}/GENERAL/DB_PORT

      - uses: azure/k8s-set-context@v4
        with:
          method: service-account
          k8s-url: ${{ env.K8S_API_URL }}
          k8s-secret: ${{ env.K8S_SERVICE_ACCOUNT_TOKEN }}

      - name: Apply Redis
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: superset-redis-master
            namespace: ${{ inputs.namespace }}
            labels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: superset
          spec:
            type: ClusterIP
            ports:
              - name: redis
                port: 6379
                targetPort: 6379
            selector:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: superset
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: superset-redis-headless
            namespace: ${{ inputs.namespace }}
            labels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: superset
          spec:
            type: ClusterIP
            clusterIP: None
            ports:
              - name: redis
                port: 6379
                targetPort: 6379
            selector:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: superset
          ---
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: superset-redis-master
            namespace: ${{ inputs.namespace }}
            labels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: superset
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: redis
                app.kubernetes.io/instance: superset
            serviceName: superset-redis-master
            replicas: 1
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: redis
                  app.kubernetes.io/instance: superset
              spec:
                containers:
                  - name: redis
                    image: public.ecr.aws/docker/library/redis:7.0
                    ports:
                      - name: redis
                        containerPort: 6379
                    volumeMounts:
                      - name: redis-data
                        mountPath: /data
                volumes:
                  - name: redis-data
                    emptyDir: {}
          EOF

      - name: Helm Install Superset
        run: |
          helm repo add superset https://apache.github.io/superset
          helm repo update

          VALUES_FILE_FLAG=""
          if [ -n "${{ inputs.values-file }}" ]; then
            VALUES_FILE_FLAG="-f ${{ inputs.values-file }}"
          fi

          cat <<EOF | helm upgrade --install superset superset/superset \
            --namespace "${{ inputs.namespace }}" \
            -f - \
            $VALUES_FILE_FLAG \
            --version 0.15.2 \
            --wait --timeout 10m
          redis:
            enabled: false

          postgresql:
            enabled: false

          supersetNode:
            connections:
              db_host: ${{ env.DB_HOST }}
              db_port: ${{ env.DB_PORT }}

          extraEnvRaw:
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SUPERSET_SECRET_KEY
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: DB_NAME
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SMTP_PASSWORD
            - name: SMTP_MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SMTP_MAIL_FROM
            - name: SMTP_SSL
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SMTP_SSL
            - name: SMTP_STARTTLS
              valueFrom:
                secretKeyRef:
                  name: superset-env
                  key: SMTP_STARTTLS
            - name: INGRESS_HOST
              value: "${{ inputs.ingress-host }}"
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /ms-playwright

          bootstrapScript: |
            #!/bin/bash
            pip install --prefix /app/.venv psycopg2-binary PyMySQL playwright
            PY_VER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            PYTHONPATH="/app/.venv/lib/python${PY_VER}/site-packages" PLAYWRIGHT_BROWSERS_PATH=/ms-playwright python3 -m playwright install-deps chromium
            PYTHONPATH="/app/.venv/lib/python${PY_VER}/site-packages" PLAYWRIGHT_BROWSERS_PATH=/ms-playwright python3 -m playwright install chromium
            if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid 0" > ~/bootstrap; fi

          configOverrides:
            secret: |
              import os
              SECRET_KEY = os.environ.get('SUPERSET_SECRET_KEY')
              SQLALCHEMY_DATABASE_URI = (
                  f"postgresql+psycopg2://{os.environ['DB_USER']}:{os.environ['DB_PASS']}"
                  f"@{os.environ['DB_HOST']}:{os.environ.get('DB_PORT', '5432')}"
                  f"/{os.environ['DB_NAME']}"
              )
            alerts_reports: |
              import os
              from celery.schedules import crontab

              FEATURE_FLAGS = {
                  "ALERT_REPORTS": True,
                  "PLAYWRIGHT_REPORTS_AND_THUMBNAILS": True,
              }

              class CeleryConfig:
                  broker_url = "redis://superset-redis-master:6379/0"
                  result_backend = "redis://superset-redis-master:6379/0"
                  imports = ("superset.tasks.scheduler", "superset.sql_lab")
                  beat_schedule = {
                      "reports.scheduler": {
                          "task": "reports.scheduler",
                          "schedule": crontab(minute="*", hour="*"),
                      },
                      "reports.prune_log": {
                          "task": "reports.prune_log",
                          "schedule": crontab(minute=0, hour=0),
                      },
                  }

              CELERY_CONFIG = CeleryConfig

              WEBDRIVER_OPTION_ARGS = [
                  "--headless",
                  "--no-sandbox",
                  "--disable-gpu",
                  "--disable-dev-shm-usage",
                  "--disable-setuid-sandbox",
              ]
              WEBDRIVER_BASEURL = "http://superset:8088/"
              _ingress_host = os.environ.get("INGRESS_HOST", "")
              WEBDRIVER_BASEURL_USER_FRIENDLY = (
                  f"https://{_ingress_host}/" if _ingress_host else WEBDRIVER_BASEURL
              )
              ALERT_REPORTS_NOTIFICATION_DRY_RUN = False
            smtp: |
              import os
              SMTP_HOST = os.environ.get("SMTP_HOST", "localhost")
              SMTP_PORT = int(os.environ.get("SMTP_PORT", 587))
              SMTP_SSL = os.environ.get("SMTP_SSL", "false").lower() == "true"
              SMTP_STARTTLS = os.environ.get("SMTP_STARTTLS", "false").lower() == "true"
              SMTP_USER = os.environ.get("SMTP_USER")
              SMTP_PASSWORD = os.environ.get("SMTP_PASSWORD")
              SMTP_MAIL_FROM = os.environ.get("SMTP_MAIL_FROM")

          supersetCeleryBeat:
            enabled: true

          init:
            enabled: true

          ingress:
            enabled: ${{ inputs.ingress-host != '' }}
            ingressClassName: haproxy
            annotations:
              haproxy.org/allow-list: "${{ inputs.allowed-ips }}"
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - ${{ inputs.ingress-host }}
            tls:
              - hosts:
                - ${{ inputs.ingress-host }}
                secretName: superset-tls
          EOF

