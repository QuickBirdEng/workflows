name: QB Security

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label for the scan jobs.'
        type: string
        default: 'default-k8s-runner'
      search-directory:
        description: 'Directory to scan recursively.'
        type: string
        default: '.'
      exclude:
        description: |
          Newline- or comma-separated glob patterns for additional files and directories to exclude.
          The following are always excluded: .git/**, node_modules/**, .idea/**, build/**, dist/**, and common binary/image types.
        type: string
        default: ''
      fail-on-found:
        description: 'Fail the workflow when any scan reports findings.'
        type: boolean
        default: true
      js-minimum-release-age-minutes:
        description: 'Required quarantine period for newly published package versions (pnpm `minimumReleaseAge`). Default 10080 (7 days). Set to 0 to disable.'
        type: number
        default: 10080
      js-allow-builds:
        description: |
          Newline- or comma-separated list of packages allowed to run install/lifecycle scripts.
          Empty (default) means NO package may run install scripts.
        type: string
        default: ''
      js-require-block-exotic-subdeps:
        description: 'Require every project to block git/tarball/file subdeps (pnpm setting + lockfile scan for all managers).'
        type: boolean
        default: true
      js-enforce-release-age-via-registry:
        description: 'When true, enforce minimumReleaseAge for npm/yarn/pnpm by querying the npm registry for each lockfile entry. Adds network calls; opt-in.'
        type: boolean
        default: false
      js-pnpm-min-version:
        description: 'Minimum pnpm version where the recommended settings take effect. Projects pinning an older pnpm get a top-level error.'
        type: string
        default: '10.0.0'

jobs:
  unicode-security-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Invisible Unicode
        uses: QuickBirdEng/actions/detect-invisible-unicode@main
        with:
          search-directory: ${{ inputs.search-directory }}
          exclude: ${{ inputs.exclude }}
          fail-on-found: ${{ inputs.fail-on-found }}

  js-supply-chain-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JS Supply-Chain Check
        uses: QuickBirdEng/actions/js-supply-chain-check@main
        with:
          search-directory: ${{ inputs.search-directory }}
          exclude: ${{ inputs.exclude }}
          minimum-release-age-minutes: ${{ inputs.js-minimum-release-age-minutes }}
          allow-builds: ${{ inputs.js-allow-builds }}
          require-block-exotic-subdeps: ${{ inputs.js-require-block-exotic-subdeps }}
          enforce-release-age-via-registry: ${{ inputs.js-enforce-release-age-via-registry }}
          pnpm-min-version: ${{ inputs.js-pnpm-min-version }}
          fail-on-found: ${{ inputs.fail-on-found }}
