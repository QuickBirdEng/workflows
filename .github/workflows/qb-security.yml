name: QB Security

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label for the scan jobs.'
        type: string
        default: 'default-k8s-runner'
      search-directory:
        description: 'Directory to scan recursively.'
        type: string
        default: '.'
      exclude:
        description: |
          Newline- or comma-separated glob patterns for additional files and directories to exclude.
          The following are always excluded: .git/**, node_modules/**, .idea/**, build/**, dist/**, and common binary/image types.
        type: string
        default: ''
      fail-on-found:
        description: 'Fail the workflow when any scan reports findings.'
        type: boolean
        default: true
      enable-unicode-scan:
        description: 'Run the invisible-Unicode detection job. Set to false to skip this scan entirely.'
        type: boolean
        default: true
      enable-js-supply-chain-scan:
        description: 'Run the JS supply-chain hardening check (npm/yarn/pnpm). Set to false to skip this scan entirely.'
        type: boolean
        default: true
      js-minimum-release-age-minutes:
        description: 'Required quarantine period for newly published package versions (pnpm `minimumReleaseAge`). Default 4320 (3 days). Set to 0 to disable.'
        type: number
        default: 4320
      js-allow-builds:
        description: |
          Newline- or comma-separated list of packages allowed to run install/lifecycle scripts.
          Empty (default) means NO package may run install scripts.
        type: string
        default: ''
      js-check-install-scripts:
        description: 'Run the install-scripts (allowBuilds) sub-check. Set to false to skip it while still enforcing minimumReleaseAge and blockExoticSubdeps.'
        type: boolean
        default: true
      js-require-block-exotic-subdeps:
        description: 'Require every project to block git/tarball/file subdeps (pnpm setting + lockfile scan for all managers). Set to false to skip this sub-check.'
        type: boolean
        default: true
      js-enforce-release-age-via-registry:
        description: |
          Opt-in CI-time band-aid for yarn/npm projects that cannot migrate to pnpm 10+ immediately.
          When true, scans lockfiles against the npm registry to enforce minimumReleaseAge at PR time.
          Does not protect dev machines running yarn install on local branches.
          Default false — yarn/npm projects will hard-fail with a migration-to-pnpm-10 prompt.
        type: boolean
        default: false
      js-pnpm-min-version:
        description: 'Minimum pnpm version where the recommended settings take effect. Projects pinning an older pnpm get a top-level error.'
        type: string
        default: '10.0.0'
      js-yarn-min-version:
        description: 'Minimum yarn version with native install-time enforcement (npmMinimalAgeGate + approvedGitRepositories). Yarn 1.x and yarn-berry below this hard-fail with a migration prompt.'
        type: string
        default: '4.14.0'

jobs:
  unicode-security-scan:
    if: ${{ inputs.enable-unicode-scan }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Invisible Unicode
        uses: QuickBirdEng/actions/detect-invisible-unicode@main
        with:
          search-directory: ${{ inputs.search-directory }}
          exclude: ${{ inputs.exclude }}
          fail-on-found: ${{ inputs.fail-on-found }}

  js-supply-chain-scan:
    if: ${{ inputs.enable-js-supply-chain-scan }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JS Supply-Chain Check
        uses: QuickBirdEng/actions/js-supply-chain-check@main
        with:
          search-directory: ${{ inputs.search-directory }}
          exclude: ${{ inputs.exclude }}
          minimum-release-age-minutes: ${{ inputs.js-minimum-release-age-minutes }}
          allow-builds: ${{ inputs.js-allow-builds }}
          check-install-scripts: ${{ inputs.js-check-install-scripts }}
          require-block-exotic-subdeps: ${{ inputs.js-require-block-exotic-subdeps }}
          enforce-release-age-via-registry: ${{ inputs.js-enforce-release-age-via-registry }}
          pnpm-min-version: ${{ inputs.js-pnpm-min-version }}
          yarn-min-version: ${{ inputs.js-yarn-min-version }}
          fail-on-found: ${{ inputs.fail-on-found }}
