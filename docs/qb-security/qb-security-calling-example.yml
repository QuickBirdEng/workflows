name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security:
    uses: QuickBirdEng/workflows/.github/workflows/qb-security.yml@main
    # with:
    #   # Tighten the package quarantine to 14 days for this repo.
    #   js-minimum-release-age-minutes: 20160
    #   # Permit specific packages to run install scripts (e.g. native-build deps).
    #   js-allow-builds: |
    #     esbuild
    #     sharp

  trufflehog-scan:
    runs-on: default-k8s-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: QuickBirdEng/actions/trufflehog-scan@main
        with:
          # PR events: scan the PR diff. Push events: scan only the new commits
          # (`github.event.before` is the SHA before this push). The trufflehog-scan
          # action handles the zero SHA (first push to a brand-new branch) by
          # falling back to HEAD~1 or full history.
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
